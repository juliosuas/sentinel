version: "3.8"

services:
  sentinel:
    build: .
    container_name: sentinel-soc
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
      - "${SYSLOG_UDP_PORT:-1514}:1514/udp"
      - "${SYSLOG_TCP_PORT:-1514}:1514/tcp"
    volumes:
      - ./data:/app/data
      - /var/log:/host/var/log:ro
    env_file:
      - .env
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - NET_RAW
    network_mode: host
